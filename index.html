<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Boutique Dermocosmétique</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f7f7f7;
    }

    header {
      background: #ffffff;
      padding: 15px;
      text-align: center;
      border-bottom: 1px solid #ddd;
    }

    h1 {
      margin: 0;
      font-size: 22px;
    }

    .container {
      padding: 15px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 15px;
    }

    .card {
      background: white;
      border-radius: 10px;
      padding: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      text-align: center;
    }

    .card h3 {
      font-size: 16px;
      margin: 10px 0;
    }

    .price {
      color: green;
      font-weight: bold;
    }

    button {
      margin-top: 10px;
      padding: 8px;
      width: 100%;
      border: none;
      background: #000;
      color: white;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      background: #333;
    }

    footer {
      text-align: center;
      padding: 15px;
      font-size: 12px;
      color: #666;
    }

    a {
      color: #333;
      text-decoration: none;
    }
  </style>
</head>

<body>

<header>
  <h1>Ma Boutique Dermocosmétique</h1>
  <a href="cgu.html">Conditions générales</a>
</header>

<div class="container">

  <div class="card">
    <h3>Crème Hydratante</h3>
    <p class="price">12 €</p>
    <button>Ajouter au panier</button>
  </div>

  <div class="card">
    <h3>Sérum Anti-âge</h3>
    <p class="price">25 €</p>
    <button>Ajouter au panier</button>
  </div>

  <div class="card">
    <h3>Gel Nettoyant</h3>
    <p class="price">10 €</p>
    <button>Ajouter au panier</button>
  </div>

</div>

<footer>
  © 2026 Boutique Dermocosmétique
</footer>

</body>
</html>
